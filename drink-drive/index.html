<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>음주운전 근절 캠페인</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="app">
    <section class="card" id="startScreen">
      <div class="logo">KoROAD</div>
    <img src="logo.JPG" alt="한국도로교통공단 제주지부 로고" class="logo-img">

<div class="hero-img-wrap">
  <img src="hero.png" alt="음주운전 근절 캠페인 이미지" class="hero-img">
</div>
      <h1>음주운전<br />근절 캠페인</h1>
      <p class="desc">
        간단한 퀴즈를 풀고<br />
        음주운전 근절 서약에 함께해 주세요.
      </p>
      <button class="main-btn" onclick="startQuiz()">시작하기</button>
    </section>

    <section class="card hidden" id="quizScreen">
      <p class="step" id="stepText">Q1 / 3</p>
      <h2 id="questionText"></h2>
      <div class="options" id="options"></div>
      <button class="main-btn" onclick="nextQuestion()">다음</button>
    </section>

    <section class="card hidden" id="resultScreen">
 <div class="result-visual">
  <img src="confetti.png" alt="" class="confetti-img">
  <img src="trophy.png" alt="퀴즈 완료" class="result-icon">
</div>
      <h2>퀴즈 완료</h2>
      <p class="score" id="scoreText"></p>
      <p class="desc" id="resultMessage"></p>
      <button class="main-btn" onclick="showPledge()">서약하기</button>
    </section>

    <section class="card hidden" id="pledgeScreen">
      <h2>음주운전 근절 서약</h2>
      <p class="pledge">
        나는 음주 후 절대 운전하지 않으며,<br />
        술자리가 있는 날에는 대중교통 또는 대리운전을 이용하고,<br />
        주변 사람의 음주운전도 적극적으로 만류할 것을 약속합니다.
      </p>

      <label class="check">
        <input type="checkbox" id="pledgeCheck" />
        <span>위 내용에 동의합니다.</span>
      </label>

      <button class="main-btn" onclick="submitPledge()">서약 완료</button>
    </section>

    <section class="card hidden" id="completeScreen">
     <img src="hands-heart.png" alt="서약 완료" class="complete-icon">
      <h2>서약 완료</h2>
      <p class="desc">
        참여해 주셔서 감사합니다.<br />
        오늘의 약속이 모두의 안전을 지킵니다.
      </p>
      <p class="org">한국도로교통공단 제주특별자치도지부</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
