<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>음주운전 근절 캠페인</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="app">

    <!-- 시작 화면 -->
    <section class="screen start-screen" id="startScreen">
      <img src="logo.JPG" alt="한국도로교통공단 제주지부 로고" class="logo-img">

      <p class="start-sub">함께 만드는 안전한 제주</p>

    <h1 class="start-title">
  <span class="blue">음주운전</span><br>
  <span class="black">근절 캠페인</span>
</h1>

      <p class="start-desc">
        퀴즈에 참여하고<br>
        음주운전 근절 서약에 함께해 주세요.
      </p>

      <img src="hero.png" alt="음주운전 근절 캠페인 이미지" class="hero-img">

      <button class="primary-btn" onclick="startQuiz()">
        시작하기 →
      </button>
    </section>

    <!-- 퀴즈 화면 -->
    <section class="screen quiz-screen hidden" id="quizScreen">
      <div class="quiz-top">
        <p id="stepText">Q1 / 3</p>
        <div class="progress">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>

      <p class="q-mark">Q.</p>
      <h2 id="questionText"></h2>

      <p class="guide">정답을 선택해 주세요.</p>

      <div class="options" id="options"></div>

      <button class="primary-btn" onclick="nextQuestion()" id="nextBtn">
        다음
      </button>
    </section>

    <!-- 결과 화면 -->
    <section class="screen result-screen hidden" id="resultScreen">
      <div class="result-visual">
        <img src="confetti.png" alt="" class="confetti-img">
        <img src="trophy.png" alt="퀴즈 완료" class="trophy-img">
      </div>

      <h2>퀴즈 완료!</h2>
      <p class="score" id="scoreText">3 / 3</p>
      <p class="result-msg" id="resultMessage">
        참여해 주셔서 감사합니다.
      </p>

      <button class="primary-btn" onclick="showPledge()">
        서약하기 →
      </button>
    </section>

    <!-- 서약 화면 -->
    <section class="screen pledge-screen hidden" id="pledgeScreen">
      <h2>음주운전 근절 서약</h2>

      <div class="pledge-box">
        나는 음주 후 절대 운전하지 않으며,<br>
        술자리가 있는 날에는 대중교통 또는<br>
        대리운전을 이용하고,<br>
        주변 사람의 음주운전도 적극적으로<br>
        만류할 것을 약속합니다.
      </div>

      <label class="check-row">
        <input type="checkbox" id="pledgeCheck">
        <span>위 내용에 동의합니다.</span>
      </label>

      <button class="primary-btn" onclick="submitPledge()">
        서약 완료
      </button>
    </section>

    <!-- 완료 화면 -->
<section class="screen complete-screen hidden" id="completeScreen">

  <div class="complete-hero">
    <img src="hands-heart.png" alt="서약 완료" class="complete-icon">
    <img src="car.png" alt="" class="complete-car">
  </div>

  <h2>서약 완료!</h2>

  <p class="complete-msg">
    참여해 주셔서 감사합니다.<br>
    오늘의 약속이<br>
    모두의 안전을 지킵니다.
  </p>

  <img src="logo.JPG" alt="한국도로교통공단 제주지부 로고" class="complete-logo">

</section>
  </main>

  <script src="script.js"></script>
</body>
</html>
