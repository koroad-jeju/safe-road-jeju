<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>음주운전 근절 캠페인</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="app">

    <!-- 시작 화면 -->
    <section class="screen start-screen" id="startScreen">
      <img src="hero.png" alt="음주운전 근절 캠페인" class="hero-full-img">

      <button class="primary-btn start-real-btn" onclick="startQuiz()">
        시작하기 →
      </button>
    </section>

    <!-- 퀴즈 화면 -->
    <section class="screen quiz-screen hidden" id="quizScreen">
      <div class="quiz-top">
        <p id="stepText">Q1 / 3</p>
        <div class="progress">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>

      <p class="q-mark">Q.</p>
      <h2 id="questionText"></h2>

      <p class="guide">정답을 선택해 주세요.</p>

      <div class="options" id="options"></div>

      <div class="explain-box hidden" id="explainBox">
        <p class="explain-result" id="explainResult"></p>
        <p class="explain-text" id="explainText"></p>
      </div>

      <button class="primary-btn" onclick="nextQuestion()" id="nextBtn" disabled>
        다음
      </button>
    </section>

    <!-- 결과 화면 -->
    <section class="screen result-screen hidden" id="resultScreen">
      <div class="result-visual">
        <img src="confetti.png" alt="" class="confetti-img">
        <img src="trophy.png" alt="퀴즈 완료" class="trophy-img">
      </div>

      <h2>퀴즈 완료!</h2>
      <p class="score" id="scoreText">3 / 3</p>
      <p class="result-msg" id="resultMessage">
        참여해 주셔서 감사합니다.
      </p>

      <button class="primary-btn" onclick="showPledge()">
        서약하기 →
      </button>
    </section>

    <!-- 서약 화면 -->
    <section class="screen pledge-screen hidden" id="pledgeScreen">
      <img src="pledge-hero.png" alt="음주운전 근절 서약" class="pledge-hero-img">

      <label class="check-row pledge-check-row">
        <input type="checkbox" id="pledgeCheck">
        <span>위 내용에 동의합니다.</span>
      </label>

      <button class="primary-btn pledge-btn" onclick="submitPledge()">
        서약 완료 →
      </button>
    </section>

    <!-- 완료 화면 -->
    <section class="screen complete-screen hidden" id="completeScreen">
      <img src="complete-hero.png" alt="서약 완료" class="complete-hero-img">
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
