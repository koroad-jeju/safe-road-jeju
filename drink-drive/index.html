<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>음주운전 근절 캠페인</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="app">

    <!-- 시작 화면 -->
    <section class="screen start-screen" id="startScreen">
      <img src="hero.png" alt="음주운전 근절 캠페인" class="hero-full-img">

      <button class="primary-btn start-real-btn" onclick="startQuiz()">
        시작하기 →
      </button>
    </section>

    <!-- 퀴즈 화면 -->
    <section class="screen quiz-screen hidden" id="quizScreen">
      <div class="quiz-top">
        <p id="stepText">Q1 / 3</p>
        <div class="progress">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>

      <p class="q-mark">Q.</p>
      <h2 id="questionText"></h2>

      <p class="guide">정답을 선택해 주세요.</p>

      <div class="options" id="options"></div>

      <div class="explain-box hidden" id="explainBox">
        <p class="explain-result" id="explainResult"></p>
        <p class="explain-text" id="explainText"></p>
      </div>

      <button class="primary-btn" onclick="nextQuestion()" id="nextBtn" disabled>
        다음
      </button>
    </section>

    <!-- 결과 화면 -->
    <section class="screen result-screen hidden" id="resultScreen">
      <div class="result-visual">
        <img src="confetti.png" alt="" class="confetti-img">
        <img src="trophy.png" alt="퀴즈 완료" class="trophy-img">
      </div>

      <h2>퀴즈 완료!</h2>
      <p class="score" id="scoreText">3 / 3</p>
      <p class="result-msg" id="resultMessage">
        참여해 주셔서 감사합니다.
      </p>

      <button class="primary-btn" onclick="showPledge()">
        서약하기 →
      </button>
    </section>

  <!-- 서약 화면 -->
<section class="screen pledge-screen hidden" id="pledgeScreen">

  <img
    src="pledge-content.png"
    alt="음주운전 근절 서약서"
    class="pledge-content-img"
  >

  <!-- 날짜, 이름, 버튼, 로고를 하나의 카드에 넣음 -->
  <div class="pledge-write-box">

    <div class="pledge-input-group">
      <label for="pledgeDate">작성일</label>

      <input
        type="date"
        id="pledgeDate"
        class="pledge-input"
      >
    </div>

    <div class="pledge-input-group">
      <label for="pledgeName">서약인</label>

      <input
        type="text"
        id="pledgeName"
        class="pledge-input"
        placeholder="이름을 입력해 주세요"
        maxlength="10"
        autocomplete="name"
      >
    </div>

    <label class="check-row pledge-check-row">
      <input type="checkbox" id="pledgeCheck">
      <span>위 서약 내용에 동의합니다.</span>
    </label>

    <button
      type="button"
      class="primary-btn pledge-btn"
      onclick="submitPledge()"
    >
      서약 완료 →
    </button>

    <!-- 기관 로고를 같은 카드 안에 배치 -->
    <div class="pledge-logo-area">
      <img
        src="pledge-logo.png"
        alt="한국도로교통공단 제주지부 및 제주특별자치도개발공사"
        class="pledge-logo-img"
      >
    </div>

  </div>
</section>
    
   <!-- 완료 화면 -->
<section class="screen complete-screen hidden" id="completeScreen">

  <div class="complete-image-wrap">

    <img
      src="./complete-card.png"
      alt="음주운전 근절 서약 완료"
      class="complete-card-img"
    >

    <div
      class="complete-date-overlay"
      id="completeDate"
    ></div>

    <div
      class="complete-name-overlay"
      id="completeName"
    ></div>

  </div>

</section>
  </main>

  <script src="script.js"></script>
</body>
</html>
